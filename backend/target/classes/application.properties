server.port=${SERVER_PORT:8080}
server.compression.enabled=true
server.compression.mime-types=application/json,text/html,text/css,text/plain
server.compression.min-response-size=1024

# MongoDB
spring.data.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/ampdb}
spring.data.mongodb.database=${MONGO_DATABASE:ampdb}
spring.data.mongodb.auto-index-creation=true

#  Collection names (change without recompiling)
mongo.collection.swift=${MONGO_COLLECTION_SWIFT:jason_swift}
mongo.collection.users=${MONGO_COLLECTION_USERS:user_ency_pass}
mongo.collection.audit=${MONGO_COLLECTION_AUDIT:audit_logs}
mongo.collection.rawcopies=${MONGO_COLLECTION_RAW_COPIES:amp_raw_copies}

#  JWT
jwt.secret=${JWT_SECRET:SwiftPlatformSecretKey2024!@#$%^&*()ABCDEF_MUST_BE_32_CHARS_MIN}
jwt.expiration=${JWT_EXPIRATION_MS:86400000}

#  CORS (comma-separated origins)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,http://localhost:3002,http://localhost:3003}

# ?? Search defaults
search.default-page-size=${SEARCH_DEFAULT_PAGE_SIZE:20}
search.max-page-size=${SEARCH_MAX_PAGE_SIZE:500}

#  Protected admin account
admin.protected-id=${ADMIN_PROTECTED_ID:ADMIN001}

#  Actuator
management.endpoints.web.exposure.include=${ACTUATOR_ENDPOINTS:health,info,metrics}
management.endpoint.health.show-details=${ACTUATOR_HEALTH_DETAILS:always}
management.info.env.enabled=true
info.app.name=SWIFT Platform
info.app.version=2.0.0
info.app.description=Enterprise SWIFT Message Monitoring

#  Logging
logging.level.com.swift.platform=${LOG_LEVEL_APP:INFO}
logging.level.org.springframework.security=${LOG_LEVEL_SECURITY:WARN}
logging.level.org.springframework.data.mongodb=${LOG_LEVEL_MONGO:WARN}
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{30} - %msg%n

# ?? Jackson
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null
spring.jackson.time-zone=${APP_TIMEZONE:UTC}